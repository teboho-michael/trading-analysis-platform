name: Deploy Production

on:
  push:
    branches:
      - final-core-operational-release
  workflow_dispatch:

concurrency:
  group: trading-analysis-platform-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/final-core-operational-release'
    runs-on:
      - self-hosted
      - windows
      - production
      - trading-analysis-platform
    steps:
      - name: Verify runner branch
        shell: powershell
        run: |
          if ("${{ github.ref_name }}" -ne "final-core-operational-release") {
            throw "Deployment is only allowed from final-core-operational-release."
          }
      - name: Checkout deployment scripts
        uses: actions/checkout@v4
      - name: Deploy exact commit
        shell: powershell
        run: |
          .\deployment\windows-vps\deploy-production.ps1 `
            -RepoRoot "C:\trading-analysis-platform" `
            -CommitSha "${{ github.sha }}" `
            -ProductionBranch "final-core-operational-release"
